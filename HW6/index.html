<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="stylesheet" href="./assets/styles/styles.css">
    <link rel="stylesheet" href="./assets/styles/normalize.css">
</head>


<body>
    <hgroup>
        <h1>CSS Dinner Shopping List</h1>
        <p class="hgroup_p">Let’s go to the mall!</p>
    </hgroup>

    <ul>
        <li class='listitem'> <input type="checkbox">
            <label>
                <span class="item">A lot of pickles</span>(for the next
                lessons about CSS)
            </label>
        </li>
        <li class='listitem'> <input type="checkbox"> <label><span class="item">10 apples</span> (for more CSS
                manipulations)</label>
        </li>
        <li class='listitem'> <input type="checkbox"> <label><span class="item">20 oranges</span> (because they are
                awesome)</label></li>
        <li class='listitem'> <input type="checkbox"> <label><span class="item">13 plates</span> (hm... they
                always dissapear)</label></li>
        <li class='listitem'> <input type="checkbox"> <label><span class="item">15 bentos</span></label></li>
        <li class='listitem'> <input type="checkbox"> <label><span class="item">1 bottle of Sake</span>(for my
                friends)</label></li>
    </ul>
    <footer>
        <div>Bon Appetit :)</div>
    </footer>
</body>

</html>
