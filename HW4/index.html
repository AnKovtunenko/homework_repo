<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form id="my_form"
        onsubmit="alert(decodeURI(new URLSearchParams(Array.from(new FormData(document.getElementById('my_form')))).toString()));return false;">
        <label for="fname"> Full name</label>
        <input type="text" id="fname" name="fname" placeholder="Enter your full name" required>
        <br>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
        <br>
        <label for="sex">Sex</label>
        <input type="radio" name="sex" value="female" checked>Female
        <input type="radio" name="sex" value="male"> Male
        <br>
        <label for="age">Age</label>
        <input type="number" id="age" name="age" min="18" max="100" placeholder="Enter your age" required>
        <br>
        <label for="courses">Courses</label>
        <select name="courses" id="courses" multiple required>
            <option value="null">Select option</option>
            <optgroup label="Programming">
                <option value="front-end">Front-End</option>
                <option value="back-end">Back-End</option>
            </optgroup>
            <optgroup label="Non-programming">
                <option value="project_manager">Project Manager</option>
                <option value="qa_manual">QA Manual</option>
            </optgroup>
        </select>
        <br>
        <label for="address">Address</label>
        <input type="text" id="address" name="address" placeholder="Country/Region,City,ZIP,Address" required>
        <br>
        <label for="privacy">Privacy policy agreement</label>
        <input type='checkbox' name='privacy' id='privacy' title="I agree with the privacy policy" required>
        <br>
        <button type="submit">Submit form</button>
        <button type='reset'>Clear form </button>
    </form>
</body>

</html>
