<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>

<body>
    <div class="container">


        My shopping cart
        <div class="box mt-6">
            <form onsubmit="return submitHandler()">
                <div class="columns">
                    <div class="column is-8">
                        <div class="field">
                            <div class="">
                                <label class="label" for="product_title">Product Title</label>
                            </div>
                            <div class="control">
                                <input class="input" type="text" id="product_title" placeholder="Enter product title">
                            </div>
                        </div>
                    </div>
                    <div class="column is-2">
                        <div class="field">
                            <label class="label" for="price">Price</label>

                            <div class="control">
                                <input class="input" type="number" id="product_price" placeholder="0.00">
                            </div>
                        </div>
                    </div>
                    <div class="column is-1">
                        <div class="field">
                            <label class="label" for="quantity">Amount</label>
                        </div>
                        <div class="control">
                            <input class="input" type="number" id="product_quantity" min="1" max="100" value="1">
                        </div>
                    </div>

                    <div class="column is-1 is-align-self-flex-end">
                        <button class='button is-primary' type="submit" id="add_product">Add</button>
                    </div>

                </div>
            </form>
        </div>
        <div class="box mt-4" id="product-list">
            <h2 class="is-size-4">Products in cart</h2>
            <table class='table is-fullwidth'>
                <thead>
                    <tr>
                        <th>#</th>
                        <th class="sortable" data-col="title" data-sort="asc">Title</th>
                        <th class="sortable" data-col="isBought" data-sort="asc">Bought</th>
                        <th class="sortable" data-col="price" data-sort="asc" id="price_th">Price</th>
                        <th class="sortable" data-col="quantity" data-sort="asc">Quantity</th>
                        <th class="sortable" data-col="total" data-sort="asc">Total</th>
                    </tr>
                </thead>
                <tfoot>
                    <tr>
                        <th></th>
                        <th></th>
                        <th></th>
                        <th></th>
                        <th></th>
                        <th id="cart_total"></th>
                    </tr>
                </tfoot>

                <tbody id="products_list"></tbody>
            </table>
        </div>
        </ul>
    </div>

    </div>
    </div>
    </div>
    <script src="./helpers.js/helpers.js"></script>
    <script src="./assets/scripts.js"></script>
    <script src="./assets/myToasts.js"></script>
</body>

</html>
